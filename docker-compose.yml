version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: amz-express-db
    environment:
      POSTGRES_DB: amzexpress
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amz-express-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/amzexpress
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: amz-express-super-secret-jwt-key-minimum-32-chars
      JWT_EXPIRATION: "86400000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amz-express-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
